<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Call of Cthulhu - 1920s Town Tinkerer</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div class="container">
      <h1 id="title">🐙 Call of Cthulhu - 1920s Town Tinkerer</h1>
      <div class="controls">
        <div class="slider-container">
          <label id="lblPopulation">Population :</label>
          <input
            type="range"
            id="popSlider"
            min="0"
            max="1000"
            value="200"
            step="1"
          />
          <input
            type="number"
            id="popInput"
            class="pop-input"
            min="1"
            max="5000000"
            value="1000"
          />
        </div>
        <div class="seed-control">
          <label>Seed :</label>
          <input type="number" id="seedInput" value="12345" />
          <button id="regenerateBtn">🔄 Regenerate</button>
          <button id="randomSeedBtn">🎲 Random Seed</button>
          <button id="populateAiBtn" class="btn-ai">🤖 AI Data</button>
          <button
            id="aiSettingsBtn"
            class="btn-ai-settings"
            title="OpenRouter API Key"
          >
            ⚙️
          </button>
          <div id="aiCacheStatus" class="ai-cache-status"></div>
        </div>
      </div>
      <div class="categories" id="categories"></div>
      <div class="summary" id="summary"></div>
    </div>
    <div class="generating" id="generating">
      <h3>⏳ Generating...</h3>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <p id="progressText" style="margin-top: 1rem; color: #888"></p>
    </div>
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal" id="modal"></div>
    </div>
    <!-- AI settings overlay -->
    <div class="ai-settings-overlay" id="aiSettingsOverlay">
      <div class="ai-settings-modal">
        <h3>🤖 OpenRouter API Key</h3>
        <p>
          Your key is stored in browser localStorage and sent directly to
          OpenRouter. It is never displayed here after saving.
        </p>
        <form autocomplete="off" onsubmit="return false;" style="margin: 0">
          <!-- Hidden username field to satisfy accessibility requirements -->
          <input
            type="text"
            name="username"
            autocomplete="username"
            style="display: none"
            aria-hidden="true"
          />
          <input
            type="password"
            id="aiKeyInput"
            placeholder="sk-or-v1-…"
            autocomplete="new-password"
          />
        </form>
        <div class="ai-settings-actions">
          <button id="aiKeySaveBtn">Save</button>
          <button id="aiKeyRemoveBtn" class="btn-danger">🗑️ Remove Key</button>
          <button id="aiKeyCancelBtn">Cancel</button>
        </div>
        <p class="ai-model-info">
          Model: deepseek/deepseek-v3.2 · ~$0.02 per 1 000 NPCs
        </p>
      </div>
    </div>

    <!-- AI progress overlay -->
    <div class="ai-progress-overlay" id="aiProgressOverlay">
      <div class="ai-progress-modal">
        <h3>🤖 Populating AI Data…</h3>
        <div class="progress-bar">
          <div class="progress-fill" id="aiProgressFill"></div>
        </div>
        <p id="aiProgressText" style="margin-top: 1rem; color: #888"></p>
        <button class="ai-cancel-btn" id="aiCancelBtn">Cancel</button>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
