<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Call of Cthulhu - 1920s Town Tinkerer</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div class="container">
      <h1 id="title">🐙 Call of Cthulhu - 1920s Town Tinkerer</h1>
      <div class="controls">
        <div class="slider-container">
          <label id="lblPopulation">Population :</label>
          <input
            type="range"
            id="popSlider"
            min="0"
            max="1000"
            value="200"
            step="1"
          />
          <input
            type="number"
            id="popInput"
            class="pop-input"
            min="1"
            max="5000000"
            value="1000"
          />
        </div>
        <div class="seed-control">
          <label>Seed :</label>
          <input type="number" id="seedInput" value="12345" />
          <button id="regenerateBtn">🔄 Regenerate</button>
          <button id="randomSeedBtn">🎲 Random Seed</button>
        </div>
      </div>
      <div class="categories" id="categories"></div>
      <div class="summary" id="summary"></div>
    </div>
    <div class="generating" id="generating">
      <h3>⏳ Generating...</h3>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <p id="progressText" style="margin-top: 1rem; color: #888"></p>
    </div>
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal" id="modal"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
